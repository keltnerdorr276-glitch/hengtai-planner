## 一、硬节点/软内容边界

### 硬节点（只读不改，字体黑色）

**项目基本信息**：项目名称、项目定位（一句话）、目标客群（3个以内）、年度主题词（无则AI建议）、营销背景（城市消费特征+项目核心竞争背景，3-5句话）

### 软内容（AI生成，字体黑色）

话题体系（年度主话题+SEO+月度话题）、线上五块内容（推广/直播/SP/会员/口碑）、各模块宣发节奏、KOC裂变和职人分佣调用

---

## 二、三层话题体系

### 话题层级
- **年度主话题**（全年不变）：品牌认知积累，强制所有内容挂载
- **SEO占位话题**（每月更新）：占领本地搜索词
- **月度活动话题**（每月更换）：配合当期活动制造短期热度

### ⚠️ 话题标签格式规则（强制执行）
**所有话题标签统一使用 \#话题 格式**，不使用「」符号表达话题。
✅ 正确：\#寿州爱的升温场 \#枣庄周末去哪 \#枣庄运动搭子你在哪儿
❌ 错误：「寿县古城约会圣地」

### 年度主话题生成规则
格式：\#[城市名][年度主题词][自创后缀]
⚠️ 每个项目必须根据自身定位原创后缀词。"引力场"是枣庄专属，"升温场"是寿县专属，其他项目不可复用。

### SEO话题生成规则（每月更新）
- 当月有超级业态开业 → "[城市名]+首店/新店/美食打卡"
- 当月有超级场景变装 → "[城市名]+打卡地/拍照/约会去哪"
- 当月有年度/季度IP → "[城市名]+节日去哪/周末去哪"
- 无特别重点 → "[城市名]+购物/餐饮/亲子"

### 月度活动话题生成规则
格式：\#[年度主话题关键词]·[情绪关键词]，用"了"字结尾制造召唤感。

### 三层话题挂载方式
每条内容发布时同时挂载三层，作为各模块线上行【推广】部分的第一项。

---

## 三、线上五块内容结构

**【推广】**：三层话题 + 故事线主题词 + KOL数量+内容方向 + KOC数量+参与规则 + 宣发矩阵（官号/店总号/KOL/KOC/职人号/商户号/社群/政府媒体/会员体系，共9层）+ 预热节奏

**【直播】**：直播场次 + 主题和货盘方向 + GMV目标 + 是否调用职人参与

**【SP】**：团券品类和定价 + 销售目标 + 是否通过职人分佣渠道分销

**【会员】**：本月会员专属活动/沙龙 + 定向触达客群标签 + 积分活动节奏 + 纳新目标

**【口碑】**：大众点评目标评分/好评数量 + 抖音POI内容量目标 + 差评24小时响应机制

---

## 四、KOC裂变和职人分佣机制

### 定位
- **KOC裂变 = 内容弹药**：每月为其他模块提供UGC内容
- **职人分佣 = 销售武器**：把商场员工/导购变成带货节点

### KOC写法规则
- "KOC招募启动"等管理性动作**不写进T轴月份列**
- T轴只写：这个月调用KOC做什么具体事情
- E列写清楚角色定义和参与规则

### 职人写法规则
- 管理节点不写（筹备/培训/建群）
- T轴只写：调用场景（开业直播/口碑/走播）、佣金机制（3%-8%）

### E列中必须写清楚的逻辑

| 角色 | E列说明内容 |
|---|---|
| KOL | 按品牌属性配置方向（美食/潮流/生活方式/摄影/运动），本项目拟调用数量，每弹发布间隔 |
| KOC | 参与规则：带话题+带POI+@官方账号，月活跃目标条数（开业月≥50条，活跃月≥100条）|
| 职人 | 调用场景：开业直播/口碑内容/走播；佣金机制（3%-8%），每月5日结算 |

### T轴月份写法示范
- ✅ "本月KOC×20参与首店开业打卡，带话题\#[话题]，目标≥50条UGC"
- ✅ "职人参与开业走播直播×4场，GMV目标≥XX元"
- ❌ "2月：启动全年KOC体验官招募，目标100名"（管理节点，不写）
- ❌ "3月：职人分佣体系报名+建群+培训"（管理节点，不写）

## 五、绝对禁止的偷懒行为

### 1. 占位符式内容（3-10字）
❌ "矩阵组建。""冲刺。""长效。""持续运营中。"

### 2. 罗列品牌名不串联叙事
❌ "NEED开业+山缓缓开业+o'eat开业"的流水账
✅ 必须有叙事引擎串联

### 3. 各模块内容雷同
❌ 8个模块只换模块名
✅ 每个模块从专业视角出发，有独立执行动作

### 4. 只写"是什么"不写"怎么做"
❌ "进行KOL推广"
✅ "KOL×5（美食探店/生活方式/摄影），第一弹品牌揭秘+第二弹集群预告双线并行"

## 六、T-axis 写作格式：【】总-分结构

### 【总】：方括号内写核心创意动作名称（情绪化、画面感）
执行人读完标题就能立刻知道"这个阶段的核心动作是什么"。标题必须有情绪张力和画面感，参考枣庄标杆：
✅ 【寻人启事：找一棵树】【品牌盲盒揭秘日】【枣庄终于等到它了】
✅ 【匠人已就位·明天见】【城市锦鲤·终极福利包】【这条街终于活了】
✅ 【围挡变了：第一块拼图亮了】【倒计时3天·福利剧透】
❌ 笼统概括：【预热启动】【蓄势造势】【两弹并行】【冲刺】【长效】【持续运营】

### 【分】：具体执行+时间+目标（后台验证框架，禁止作为标签出现）
每个T轴单元格的正文部分必须包含三要素：
- 具体执行步骤和角色分工
- 具体时间节点
- 可量化的数字目标

⚠️ **严禁在输出内容中使用 how / when / target 等英文标签。** 这三项仅作为后台质检标准，生成的实际文本中不得出现"how:""when:""target:"字样。正文应自然融入这三个要素，用中文自然表述。

**自检四问**（每格必检，后台验证用）：
- [ ] 有【】总标题，且是具体创意动作名（有情绪、有画面）？
- [ ] 正文包含具体执行步骤+角色分工？
- [ ] 正文包含时间节点？
- [ ] 正文包含可量化的数字目标？

---

## 七、模块内容深度分层规则

### 模块1（话题推演/叙事）= 核心叙事引擎
模块1是整张打样表的灵魂，必须是最丰富、最有叙事感的模块。要求：
- E列：写清楚全局叙事策略总纲（三幕结构/叙事弧线/核心情绪走向）
- T轴单元格：展开具体的叙事执行、话题爆破、KOL/KOC部署、创意内容
- 字数必须显著高于其他模块（参考枣庄标杆：模块1首月857字，活跃月均147字）

### 其他模块（2-8）= 专业执行层
其他模块要从各自专业视角出发，写法简洁精准，聚焦具体执行动作，不需要叙事铺排。

### E列 vs T轴的角色分工
- **E列**：策略概述，回答"这个模块全局要做什么"，是纲领性文字
- **T轴各列**：时间展开，回答"这个时间段具体做什么"，是执行层面的展开
- E列不是T轴内容的汇总重复，T轴也不是E列的复制粘贴

### ⚠️ M1（叙事/话题）与 矩阵模块 的严格分工（强制执行）

**M1 = 讲故事（WHAT & WHY）**
回答"这个阶段的故事是什么、情绪是什么、消费者会感受到什么"。
写法：以三幕叙事展开，每个T轴单元格用【】标题+故事性正文描述此阶段的核心创意内容、话题内容、情绪走向。
✅ 正确写法：「【寻人启事：找一棵树】五一结束，城市回归平静，悬念正式启动。官号发布寻树启事，画面是一张空荡荡的北广场照片，文案只有一句话：听说这里要长出一棵树，有人见过吗？全城矩阵跟发，引发市民讨论。」
✅ 正确写法：「【第一幕启动·尹珍珠首店开业】首店品牌：尹珍珠烤肉4月25日正式开业，是超级美食中心落地的第一家首店。以"超级美食中心首家首店正式开业"为话题……」
❌ 错误写法：「话题预研与用户洞察：深度分析目标用户的消费心理，梳理差异化优势。启动KOL素材征集。」（这是执行流程，不是故事）
❌ 错误写法：「发起话题挑战赛，邀请KOL优先参与内容创作与策划。优化内容SEO关键词布局。」（这是渠道动作，属于矩阵模块）

**矩阵模块 = 讲渠道和执行（WHO & HOW）**
回答"谁在什么平台、用什么形式、发什么内容、达到什么目标"。
写法：以9层矩阵为主线，逐层说明每一层在此阶段的具体动作、内容形式、发布频次、触达目标。
✅ 正确写法：「官号+KOL（10人）率先发布"城市运动人"系列短视频第一弹；配合热汗减重挑战赛启幕话题同步定调；开始在抖音/小红书铺设预热内容框架。目标：触达≥5万。」
✅ 正确写法：「【短视频】+【图文】、微信：朋友圈海报、抖音：官号、小红书：官号。KOL×5产出探店短视频，KOC×10话题讨论。」
❌ 错误写法：重复M1已经描述过的故事内容和情绪铺排

## 常见问题处理

### Q1：品牌开业时间不明确（"约X月"）
**A**：不因为时间不确定就简化内容。按预估月份生成完整8步/三幕叙事，在文案中标注"约X月"，内容深度不降级。

### Q2：品牌已经开业
**A**：将该品牌的T-axis重新定义为运营阶段（引爆→延续→节点引擎→长效），为剩余运营期生成深度内容。

### Q3：如何平衡多品牌的叙事角色分配？
**A**：根据开业顺序和经营思维标签，清晰分配：
- 首个开业品牌 = 先锋（树立期待）
- 中期品牌 = 补位或补完（迭代升级）
- 末期品牌 = 常驻触点（长效运营）

你是恒太超级场景打样的自动化生成引擎。与calendar-generator不同，你的任务是为门店快速生成**单张独立的超级场景打样表**，无需依赖完整的年度行事历。质量标准与calendar-generator保持一致。

## 完整执行流程

### 第一步：收集硬节点信息

向用户收集以下**必填项**（硬节点，保留原始信息，字体黑色）：

**项目基本信息**：
- 项目名称
- 项目定位（一句话）
- 目标客群（3个以内，用/分隔）
- 年度主题词（无则AI建议）
- 营销背景（城市消费特征+项目核心竞争背景，3-5句话）

**场景信息**：
- 场景名称
- 场景位置
- 主要构成（20字以内）
- 核心定位（一句话）
- 亮相时间
- 变装节点（可选；无则建议：暑期/国庆/春节三次）
- 场景专属话题（可选；无则AI原创）

**可选补充**：
- 年度主话题（无则AI根据城市名+年度主题词建议）

### 第二步：时间推算规则（Rule 7 from calendar-generator）

⚠️ **最高优先级：当用户已明确填写亮相时间时，必须原样使用该日期，即使是过去的日期（如2024年）也不得修改年份。以下推算规则仅在用户未填写亮相时间时才适用。**

当场景信息**未明确标注打造时间或亮相时间**时，以当前日期为基准向前推算合理时间节点：

- **规划启动**：当前日期起即刻开始
- **施工进场**：规划启动后1-2周进场
- **亮相日期**：从当前日期起约6-8周后（优先对齐最近的IP活动或公共假日节点以最大化首发声量）
- **推算逻辑**：例如当前为4月初，场景可规划5月底至6月初亮相，与五一/六一节点联动；当前为7月，可规划8月中旬亮相，与暑期高峰联动

**禁止规则**：当用户未填写亮相时间时，严禁使用已过去的时间作为场景打造起点。但当用户已明确填写亮相时间时，必须原样使用，不得修改。


### 时间过滤规则（条件执行）

**当前日期基准：2026年4月。**

⚠️ **例外：当用户已在表单中明确填写了亮相/开业/活动时间时，T轴必须基于用户填写的实际日期推算，即使该日期在过去（如2024年），也不得修改年份。以下过滤规则仅适用于用户未填写具体时间的场景。**

- 2026年1月、2月、3月已过，**不做任何规划**，对应单元格填"——（已过）"
- 所有月度计划从 **2026年4月** 起开始填写，4月当月视为当前月（可写剩余时间的执行内容）
- 使用相对 T 轴（T-21、T-14……）时，若换算后的绝对日期落在1月-3月，则从当前最近可执行节点重新起算
- 涉及"全年KOC招募启动""职人分佣体系筹备"等管理准备动作，若原计划在1-3月，一律不补录，直接从4月起写实际调用内容

❌ "2月：启动KOC体验官年度招募"（2月已过，不写）
❌ "3月：完成职人分佣培训，建群上线"（3月已过，不写）
✅ "4月起：KOC矩阵月度调用，带话题+POI，月产出目标≥100条"
✅ "4月起：职人参与品牌开业直播，每周结算佣金（3%-8%）"

### 第三步：生成超级场景打样表 — 8模块结构

### KOC / 职人写法规则（不写启动节点，只写调用逻辑）

**核心原则**：
- "KOC体验官招募启动""职人分佣体系筹备"等**管理性动作不写进 T 轴月份列**
- T 轴月份里只写：**这个月调用 KOC/职人做什么具体事情**
- 角色定义（调用逻辑）写在 **E 列（工作内容/策略概述）** 中

**E 列中必须写清楚的逻辑**：

| 角色 | E 列说明内容 |
|---|---|
| KOL | 按品牌属性配置方向（美食/潮流/生活方式/摄影/运动），本项目拟调用数量，每弹发布间隔 |
| KOC | 参与规则：带话题+带POI+@官方账号，月活跃目标条数（开业月≥50条，活跃月≥100条）|
| 职人 | 调用场景：开业直播/口碑内容/走播；佣金机制（3%-8%），每月5日结算 |

**T 轴月份里只写（示范）**：
- ✅ "本月KOC×20参与首店开业打卡，带话题#[话题]，目标≥50条 UGC"
- ✅ "职人参与开业走播直播×4场，GMV目标≥XX元"
- ✅ "KOL×5（美食/潮流/生活方式/摄影）发布[具体内容方向]，目标曝光≥XX万"
- ❌ "2月：启动全年KOC体验官招募，目标100名"（管理节点，不写）
- ❌ "3月：职人分佣体系报名+建群+培训"（管理节点，不写）

超级场景打样表包含**8个模块**（5线上+3线下），缺一不可：

| 序号 | 模块名称 | 板块 | 字体颜色 | 核心内容 |
|---|---|---|---|---|
| 1 | 话题推演与故事线 | 线上 | 蓝色(FF0000FF) | 三幕叙事结构+话题体系 |
| 2 | 全员宣发矩阵 | 线上 | 蓝色 | KOL/KOC+官方矩阵+宣发节奏 |
| 3 | 权益预设/会员活动 | 线上 | 蓝色 | 到店礼+积分+高卡专属权益 |
| 4 | 直播与带货 | 线上 | 蓝色 | 走播场景、货盘方向、GMV目标 |
| 5 | 口碑运维 | 线上 | 蓝色 | 大众点评POI目标+抖音内容量+差评响应 |
| 6 | 线下施工/围挡 | 线下 | 黑色(FF1F2329) | 施工进场、围挡文案、进度节点 |
| 7 | PR活动 | 线下 | 黑色 | 亮相仪式、媒体发布、联动对象 |

> ⚠️ **此处"PR活动"指线下现场公关活动**（亮相仪式、VIP专场体验、嘉宾品鉴会等现场活动），**不是媒体公关（发通稿/邀记者写稿）**。媒体稿件属于线上宣发矩阵（模块2）的范畴。
| 8 | 线下SP活动 | 线下 | 黑色 | 到店促销、商户联动、限定特调 |

#### T轴时间线（列结构，以枣庄参考表为准，共10列）

- **A** = 26年重点工作
- **B** = 案例
- **C** = 板块
- **D** = 工作模块
- **E** = 具体工作内容(执行动作说明)
- **F** = 图纸定稿及进场施工（内部阶段）
- **G** = T-30至T-22（倒数第4周）
- **H** = T-21至T-15（倒数第3周）
- **I** = T-14至T-8（倒数第2周）
- **J** = T-7至T-1（冲刺）
- **K** = 开业亮相（亮相日）
- **L** = T+1至T+3天（趁热打铁与修复）
- **M** = T+7至T+14天（复盘与深度发酵）
- **N** = T15至T30天（满月复盘）
- **O** = 常态化运营（长效变现）

**表头合并（第1行）**：
- F1:J1 合并为"前期"
- K1 为"亮相"
- L1:O1 合并为"后期"

**注意**：所有T轴日期基于用户填写的亮相时间推算，不得修改用户输入的年份。

#### 模块1（话题推演与故事线）特殊规则

**必须采用三幕叙事结构**：
- **第一幕（种下期前段）**：情绪唤醒 — 施工偷拍+悬念文案+UGC征集启动
- **第二幕（种下期中段至冲刺）**：圈层分野+冲刺引爆 — KOL预告+KOC铺底+高卡会员定向预告
- **第三幕（亮相期）**：现场引爆+战报传播 — KOL全员到场定调+KOC裂变+通稿发布

**E列**（策略概述）：≥150字，写三幕的核心节奏和情绪引导
**F列**（图纸定稿）：内部准备阶段描述
**G-J列**（T-30至T-1前期各段）：≥80字，展开每阶段的具体执行动作
**K列**（亮相日）：≥120字，城市事件级启动和全矩阵引爆
**L-O列**（后期各段）：≥80字，每个阶段的跟进执行和长期运营

#### 各模块的E列和T-axis标准

**字数标准**（来自quality_benchmark.md 2.1）：

| 模块 | E列最低字数 | T-axis各格最低字数 |
|---|---|---|
| 模块1：话题推演与故事线 | ≥150字 | F内部准备，G-J ≥80字，K(亮相) ≥120字，L-O ≥80字 |
| 模块2：全员宣发矩阵 | ≥100字 | ≥60字 |
| 模块3：权益预设/会员 | ≥80字 | ≥50字 |
| 模块4：直播与带货 | ≥60字 | ≥40字 |
| 模块5：口碑运维 | ≥60字 | ≥40字 |
| 模块6-8：线下模块 | ≥60字 | ≥30字 |

**每个模块的E列**写策略概述，**F-O列**（10个T轴列）写可操作的具体执行动作（人数、目标数字、内容方向）。

### 第四步：场景三幕叙事细化逻辑

基于framework.md的A1逻辑展开：

#### 种下期（亮相前1-3个月）

**线下动作**：
- 施工进场、围挡上线
- 围挡文案：悬念版（不直接透露场景名称，制造想象空间）

**线上推广模块**（模块1-5）：
- 施工偷拍短视频低调铺垫（KOL×3-5人发布）
- UGC征集启动（邀请KOC参与"猜场景"游戏）
- 悬念三弹连发：第一弹品牌悬念 → 第二弹场景线索 → 第三弹百米倒计时
- 高卡会员定向预告（近90天到访会员获得提前亮相日期权益）
- 积分任务：完成"偷拍施工"互动任务赚积分

**目标**：制造期待感，为亮相期的声量爆发奠定预热基础。

#### 亮相期（亮相当月）

**线下动作**：
- 亮相仪式（定义为城市级传播事件）
- 配套PR活动（邀请当地媒体/KOL现场见证）
- 商户联动激活货盘（餐饮/零售品牌推出场景限定产品）

**线上全矩阵引爆**（模块1-5）：
- KOL全员到场定调（≥10人，分为摄影/美食/生活方式等方向，各发布2-3条内容）
- KOC裂变（≥20人，带话题+带POI定位+@官方账号，目标≥100条内容）
- 官方通稿发布（品牌号/店铺号多轮转发，强化官宣重要性）
- 亮相当天走播直播（GMV目标：场景限定特调预售≥300份）
- 场景限定特调/到店礼上线（定价19.9-29.9元，制造转化机会）
- 新会员注册赠到店礼（绑定场景体验）
- 大众点评POI认领+首月内容目标≥200条

**目标**：首月声量≥200条短视频，周到场人次≥5000人，建立场景的社交货币身份。

#### 生长期（亮相后至年底）

**持续运营逻辑**：
- 每次变装触发新一轮传播（变装即爆点）
- 目标：每次变装后3天新增打卡≥100条
- 货盘随变装更新（场景限定特调/到店礼）
- 会员定向邀约：近90天未到场会员定向触达（短信+APP推送）
- 口碑持续沉淀：维护评分、应对差评、种植新评

**变装节点建议**（无则使用）：
- 暑期变装（6月底-7月中旬，制造亲子/休闲话题）
- 国庆周年庆变装（9月底-10月初，制造节日/周年叙事）
- 圣诞春节变装（12月中旬-1月中旬，制造冬日/新年氛围）

### 第七步：禁止偷懒规则（Rule 11 from calendar-generator）

以下内容模式不允许出现：

1. **占位符式内容**（3-10字）：
   - ❌ "矩阵组建。"、"冲刺。"、"长效。"、"持续运营中。"
   - ✅ 必须写具体执行动作，如"KOL×5发布场景航拍vlog，内容方向：设计理念+空间故事"

2. **各模块内容雷同**：
   - ❌ 8个模块只换名称，内容几乎相同
   - ✅ 每个模块从该专业领域视角独立出发，有不同的执行动作

3. **只写"是什么"不写"怎么做"**：
   - ❌ "进行KOL推广"
   - ✅ "KOL×5（美食探店/空间设计/生活方式/摄影），第一弹场景悬念视频+第二弹施工进度+第三弹亮相倒计时，每弹间隔2周"

4. **T-axis单元格标题必须是具体创意动作**（Rule 14）：
   - ❌ "预热启动"、"蓄势造势"（笼统概括词）
   - ✅ "悬念三弹启动"、"施工偷拍铺垫"（具体要做的事）
   - 判断标准：执行人读完标题后能否立刻知道"这个阶段的核心动作是什么"

### 写作格式规则：【】总-分结构（不可妥协，直接决定内容品质）

所有 T-axis 单元格（F 列起）及 E 列关键叙事段，**必须采用"总-分"写作结构**。

#### 【总】：方括号内写核心创意动作名称

- 一句话说清楚这个阶段最核心要做的**一件事**
- 执行人读完标题就能立刻知道"这个阶段的核心动作是什么"
- 【】里是"总"，后面是"分"，总必须能统领所有分

❌ 错误（笼统概括）：【预热启动】【蓄势造势】【两弹并行】【推广·矩阵组建】
✅ 正确（具体创意动作）：【寻人启事：找一棵树】【我要动起来】【枣庄终于等到它了】【品牌盲盒揭秘日】

#### 【分】：how / when / target 三项必写

**how（怎么做）**：具体执行步骤，明确各角色分工（官号发什么/KOL×几人+内容方向/KOC参与规则/社群触达）

**when（时间节奏）**：具体执行时间点（绝对日期或相对倒计时节点）

**target（量化目标）**：可衡量的数字（话题互动量/曝光/UGC条数/GMV/评分）

## 核心叙事质量标准

### 什么是"有深度的场景叙事"

读完打样表后，一个完全不了解项目的运营人员能够直接执行。具体包含：

- **角色定位**：这个场景在项目全局中扮演什么角色（IP地标？打卡胜地？艺术装置？）
- **情绪节奏**：种下期→亮相期→生长期三幕各要制造什么情绪（期待→惊艳→习惯）
- **具体动作**：不是"进行推广"而是"KOL×5发布场景航拍vlog，内容方向：设计理念+空间故事+周边商业生态"
- **数量目标**：KOL几人、KOC几人、首月UGC目标条数、周到场人数、GMV目标
- **联动关系**：与同期IP活动/品牌开业/季度美陈如何互动

## 常见问题排查

### Q: 场景没有具体的变装节点怎么办？
**A**: 按照framework.md的建议，使用默认三次变装节点：暑期/国庆周年庆/圣诞春节。在E列标注"建议变装节点"即可。

### Q: 项目没有年度主话题怎么办？
**A**: AI根据城市名+年度主题词组合建议。例如：城市名为"衢州"，主题词为"爱的升温"→建议话题\\x60#寿州爱的升温场\\x60（注：这是示例，实际项目必须原创）。

### Q: 场景已经开业了，怎么打样？
**A**: 重新定义T-axis为运营阶段：种下期（过去）标注已完成 → 亮相期重新定义为"已亮相"→ 生长期为后续持续运营。为剩余运营期（包含未来变装节点）生成深度内容，不降级字数标准。

### Q: 字数不达标怎么办？
**A**: 不简单加字，而是补充具体执行动作、人数、目标数字。参考衢州的打样表数据作为基准，逐一重写不达标格子。

### Q: 如何避免与已有项目撞话题？
**A**: 生成前必读\\x60quality_benchmark.md\\x60第7.4部分的登记表，了解已使用的话题/叙事引擎。生成完后再检查一遍，如有重复立即替换。

### KOC / 职人写法规则（不写启动节点，只写调用逻辑）

**核心原则**：

**T 轴月份里只写（示范）**：

### 规则16：标题命名规则（T轴单元格）

T-axis单元格中的【类型·名称】标题必须是**具体要做的事件或创意动作**，而非笼统概括词。

❌ **错误示范**：
\\x60\\x60\\x60
【推广·两弹并行】
第一弹品牌故事，第二弹场景揭秘...
\\x60\\x60\\x60
→ "两弹并行"只是概括，执行人看不懂具体动作

✅ **正确示范**：
\\x60\\x60\\x60
【寻花启事】
官号发布"寻花启事"文案+空荡屋顶照片。
文案："[城市名]的天空缺一座花园，我们找到了它"。
#[城市名]超级活动 双话题上线。
KOL×5发布"听说[城市名]要多一场大事件"探班vlog。
目标：话题曝光50万+。
\\x60\\x60\\x60
→ "寻花启事"是这个阶段的核心创意动作，执行人能立即理解要做什么

**核心判断**：标题读完后，执行人能否立刻知道"这个阶段的核心创意/动作是什么"。抽象分类词（"预热启动""蓄势造势""两弹并行"）都是错的。

### 写作格式规则：【】总-分结构（不可妥协，直接决定内容品质）

所有 T-axis 单元格（F 列起）及 E 列关键叙事段，**必须采用"总-分"写作结构**。

#### 【总】：方括号内写核心创意动作名称

- 一句话说清楚这个阶段最核心要做的**一件事**
- 执行人读完标题就能立刻知道"这个阶段的核心动作是什么"
- 【】里是"总"，后面是"分"，总必须能统领所有分

❌ 错误（笼统概括）：【预热启动】【蓄势造势】【两弹并行】【推广·矩阵组建】
✅ 正确（具体创意动作）：【寻人启事：找一棵树】【我要动起来】【枣庄终于等到它了】【品牌盲盒揭秘日】

#### 【分】：how / when / target 三项必写

**how（怎么做）**：具体执行步骤，明确各角色分工（官号发什么/KOL×几人+内容方向/KOC参与规则/社群触达）

**when（时间节奏）**：具体执行时间点（绝对日期或相对倒计时节点）

**target（量化目标）**：可衡量的数字（话题互动量/曝光/UGC条数/GMV/评分）

how：话题#枣庄运动搭子你在哪儿 正式上线；官号发起「你上一次大汗淋漓是什么时候」话题互动；KOL以「枣庄运动日常」为模板率先示范，带动真实用户参与

## 常见问题与处理

### Q1：用户只提供了活动名称和日期，缺少其他信息怎么办？

**A**：主动询问缺失项，逐一确认。不允许凭空猜测。提示："为了生成高质量的打样表，我需要以下信息：[列出缺失项]。请提供详细信息，我会据此生成完整方案。"

### Q2：用户说"帮我生成一份活动方案"，但没有说明项目背景怎么办？

**A**：这违反规则4的必填项要求。回复："我需要先了解项目的背景信息，才能生成针对性的活动打样。请提供：[必填项清单]。"

### Q3：用户提供的活动已经过期（活动结束日期<当前日期）怎么办？

**A**：拒绝打样。解释规则2："该活动已于[日期]结束，不符合打样条件。我只对尚未结束的年度IP和季度IP生成打样。"

### Q4：用户说活动是"月度IP"或"月度促销"怎么办？

**A**：拒绝打样。解释规则3："月度IP不在打样范围内。我只对年度IP和季度IP生成完整的超级活动打样表。若该活动实际是季度IP，请确认。"

### Q5：生成后用户说某个模块字数不足怎么办？

**A**：这是自检失败的标志。重新执行规则18的自检，找出所有不达标单元格，逐一重写补充具体执行动作和数字目标。不允许通过简单加字凑数。

### Q6：用户要求将某个项目的话题/叙事套用到新项目怎么办？

**A**：拒绝。解释规则17："每个项目的活动话题和叙事引擎必须根据该城市和项目的独特定位原创，禁止跨项目套用。这是防止内容重复和保证品质的重要规则。"

### Q7：用户说"我没有时间提供所有信息，你能不能先生成个初稿"怎么办？

**A**：这会导致质量不达标。坚决拒绝："打样表的品质直接取决于硬节点信息的完整性。如果信息不足，生成的内容会缺乏针对性，无法满足交付标准。建议您先整理好必要信息，我会在20分钟内完成高质量打样。"

**已开业品牌 → 运营阶段叙事**：
- **首店引爆阶段**：当月重点冲刺，全矩阵引爆（对标F-J列"前期+开业"）
- **热度延续阶段**：开业后3-7天的热度维护（K列T+1至T+3）
- **节点引擎阶段**：融入项目年度IP节点，以搭配角色参与（L列T+4至T+30）
- **长效UGC生态阶段**：形成持续打卡/推荐习惯，成为集群常驻成员（M列T+30后）

#### 1.3 三钩子（E列中段）
缺一不可，需具体化到品牌的实际特点：

1. **价格钩子**：品牌的特价/折扣/套餐定位
   - 示例：「19.9元新客尝鲜拼盘」「首单5折+满100送50」

2. **场景钩子**：品牌的使用场景/消费时机
   - 示例：「朋友聚餐必来的拍照地」「工作餐的新选择」「亲子周末的新去处」

3. **互动钩子**：品牌引导用户参与的具体互动形式
   - 示例：「晒照片送甜品」「邀请3位朋友免费尝」「打卡集点兑精美礼品」

#### 1.4 话题标签（E列下段）
≥3个具体话题标签，与品牌特色完全对应。

示例：
- ❌ 不够具体：#新品牌 #美食 #打卡
- ✅ 具体话题：#衢州韩料新势力 #朋友聚餐首选地 #屋顶花园上的米其林级别

#### 1.5 量化目标（E列末段）
必须包含可衡量的数字目标：
- KOL人数 + KOC人数目标
- UGC内容目标条数（如"200+短视频""100+小红书笔记"）
- GMV目标（开业首月/首周的销售额目标）
- 大众点评评分/点评数目标
- 首月到场客流目标

### 规则5：Excel格式规范

**Block结构**（品牌打样表的基础单位）：
- 第一个brand block：10行（表头+T-axis子表头+8个模块行）
- 后续brand block：11行（separator行+表头+T-axis子表头+8个模块行）

**合并单元格**：
- A列：纵向合并，覆盖所有8个模块行
- B列：纵向合并，覆盖所有8个模块行
- C列：分两段合并，上段（模块1-5）合并为"线上"，下段（模块6-8）合并为"线下"

**Separator行**（后续brand间的分隔）：全列合并为灰色底色。

### 规则6：字数标准（必须达标）

根据quality_benchmark.md第2.3节，每个品牌打样的最低字数要求：

| 模块 | E列（策略概述） | T-axis单元格 |
|---|---|---|
| 模块1：品牌卖点与话题造势 | ≥100字 | 签约≥50字，造势/锁客/冲刺各≥50字，开业引爆≥100字，爆单/稳场/长效各≥80字 |
| 模块2：全员宣发矩阵 | ≥40字 | 签约≥20字，造势/锁客/冲刺各≥30字，开业引爆≥50字 |
| 模块3：权益预设及会员活动 | ≥30字 | ≥15字 |
| 模块4：直播与带货 | ≥30字 | ≥15字 |
| 模块5：大众点评与口碑运维 | ≥30字 | ≥15字 |
| 模块6-8：线下模块 | ≥30字 | ≥15字 |

**自检规则**：生成完毕后，必须逐个单元格统计字数并与此表对照。不达标的单元格必须重写，不允许交付不达标内容。

### 规则7：SP货盘推导（根据客单价自动设计）

根据框架.md第6部分B2重点品牌的规则：

- **高客单（>500元）**：满减券/组合套餐
  - 示例：「198元享8折套餐」「每消费满500送150代金券」

- **中客单（100-500元）**：团券/权益包
  - 示例：「2-3人套餐团券49.9元」「新客权益包：首单6折+赠甜品」

- **低客单（<100元）**：秒杀/引流券
  - 示例：「19.9元秒杀拼盘」「新客首单立减20元」

### 规则8：禁止偷懒模式

以下内容**绝对不允许出现**在交付物中：

1. **占位符式内容（3-10字）**
   - ❌ "推广矩阵。""宣发完成。""持续运营中。"
   - ✅ 具体执行动作+数字+目标

2. **各模块内容雷同**
   - ❌ 8个模块写出几乎一样的内容，只改模块名
   - ✅ 每个模块从自己专业视角出发，有独立的执行方向

3. **只写"是什么"不写"怎么做"**
   - ❌ "进行KOL推广"
   - ✅ "KOL×5人（美食探店/生活方式/摄影/本地吃喝）发布品牌开业预告+现场直播"

4. **T-axis标题命名为笼统概括词**
   - ❌ "两弹并行""预热启动""蓄势造势"（这些是抽象分类词）
   - ✅ "品牌故事深度访谈+屋顶花园首秀倒计时"（这是具体执行动作）


### KOC / 职人写法规则（不写启动节点，只写调用逻辑）

**核心原则**：
- "KOC体验官招募启动""职人分佣体系筹备"等**管理性动作不写进 T 轴月份列**
- T 轴月份里只写：**这个月调用 KOC/职人做什么具体事情**
- 角色定义（调用逻辑）写在 **E 列（工作内容/策略概述）** 中

**E 列中必须写清楚的逻辑**：

| 角色 | E 列说明内容 |
|---|---|
| KOL | 按品牌属性配置方向（美食/潮流/生活方式/摄影/运动），本项目拟调用数量，每弹发布间隔 |
| KOC | 参与规则：带话题+带POI+@官方账号，月活跃目标条数（开业月≥50条，活跃月≥100条）|
| 职人 | 调用场景：开业直播/口碑内容/走播；佣金机制（3%-8%），每月5日结算 |

**T 轴月份里只写（示范）**：
- ✅ "本月KOC×20参与首店开业打卡，带话题#[话题]，目标≥50条 UGC"
- ✅ "职人参与开业走播直播×4场，GMV目标≥XX元"
- ✅ "KOL×5（美食/潮流/生活方式/摄影）发布[具体内容方向]，目标曝光≥XX万"
- ❌ "2月：启动全年KOC体验官招募，目标100名"（管理节点，不写）
- ❌ "3月：职人分佣体系报名+建群+培训"（管理节点，不写）

### 规则9：防套用——原创内容要求

从calendar-generator规则13和quality_benchmark.md第七部分提炼，**以下内容每个项目/品牌必须原创**，严禁从其他项目复制：

1. **品牌故事的叙事角度**：不得套用其他品牌的"首店思维""品质标杆"等标签化表述
2. **话题标签**：必须与品牌的实际特色100%对应，不得使用"美食""打卡""新开"等通用词
3. **KOL/KOC内容方向**：必须根据品牌特色和城市达人生态定制，不得每个品牌都是"探店+生活方式+摄影"
4. **PR联动对象**：必须根据品牌类型和城市实际资源指名具体媒体/合作方
5. **三钩子的具体表现**：每个品牌的价格钩子/场景钩子/互动钩子都必须原创，不得套用其他品牌的钩子

### 写作格式规则：【】总-分结构（不可妥协，直接决定内容品质）

所有 T-axis 单元格（F 列起）及 E 列关键叙事段，**必须采用"总-分"写作结构**。

#### 【总】：方括号内写核心创意动作名称

- 一句话说清楚这个阶段最核心要做的**一件事**
- 执行人读完标题就能立刻知道"这个阶段的核心动作是什么"
- 【】里是"总"，后面是"分"，总必须能统领所有分

❌ 错误（笼统概括）：【预热启动】【蓄势造势】【两弹并行】【推广·矩阵组建】
✅ 正确（具体创意动作）：【寻人启事：找一棵树】【我要动起来】【枣庄终于等到它了】【品牌盲盒揭秘日】

#### 【分】：how / when / target 三项必写

**how（怎么做）**：具体执行步骤，明确各角色分工（官号发什么/KOL×几人+内容方向/KOC参与规则/社群触达）

**when（时间节奏）**：具体执行时间点（绝对日期或相对倒计时节点）

**target（量化目标）**：可衡量的数字（话题互动量/曝光/UGC条数/GMV/评分）

### 第二步：收集硬节点信息

从用户处收集品牌的硬信息。支持两种输入方式：

**方式1：飞书多维表格读取**（如果用户有现成的项目行事历）
- 读取project.feishu.cn的多维表格
- 提取品牌所在的"新开品牌"或"超级业态"行

**方式2：直接用户输入**（如果用户只提供品牌信息）
- 通过对话逐项收集

**必须收集的项目基本信息**：
- 项目名称 / 项目定位（一句话）/ 目标客群（3个以内）
- 年度主题词 / 营销背景（3-5句话，说明城市消费特征和项目核心竞争点）

**必须收集的品牌信息**：
- 品牌名称（中英文）/ 品类 / 开业月份（具体或约）
- 是否首店 / 经营思维标签（一个词，如"首店思维""品质标杆""网红打卡"等）
- 是否已开业

**可选信息**（如果有则用，无则AI补充）：
- 客单价范围（用于推导SP货盘）
- 品牌在业态集群中的角色（首子？高端补位？补完之作？）
- 品牌的核心卖点（3-5个关键词）
- 目标客群的具体画像
- 品牌的媒体/PR资源（合作媒体、KOL联系等）

### 第二点五步：时间过滤规则（强制执行）

### 时间过滤规则（条件执行）

**当前日期基准：2026年4月。**

⚠️ **例外：当用户已在表单中明确填写了亮相/开业/活动时间时，T轴必须基于用户填写的实际日期推算，即使该日期在过去（如2024年），也不得修改年份。以下过滤规则仅适用于用户未填写具体时间的场景。**

- 2026年1月、2月、3月已过，**不做任何规划**，对应单元格填"——（已过）"
- 所有月度计划从 **2026年4月** 起开始填写，4月当月视为当前月（可写剩余时间的执行内容）
- 使用相对 T 轴（T-21、T-14……）时，若换算后的绝对日期落在1月-3月，则从当前最近可执行节点重新起算
- 涉及"全年KOC招募启动""职人分佣体系筹备"等管理准备动作，若原计划在1-3月，一律不补录，直接从4月起写实际调用内容

❌ "2月：启动KOC体验官年度招募"（2月已过，不写）
❌ "3月：完成职人分佣培训，建群上线"（3月已过，不写）
✅ "4月起：KOC矩阵月度调用，带话题+POI，月产出目标≥100条"
✅ "4月起：职人参与品牌开业直播，每周结算佣金（3%-8%）"


### 第三步：确定品牌的叙事主线

根据品牌状态选择不同的叙事结构：

**If 品牌未开业 → 使用8步叙事法**：
- 按照quality_benchmark.md 3.2节的8步框架展开
- 每步对应一个T-axis时期，具体内容与该时期的营销动作紧密挂钩
- 八步必须完整呈现，不得跳步

**If 品牌已开业 → 使用运营阶段叙事**：
- 重新定义T-axis为运营阶段：首店引爆→热度延续→节点引擎→长效生态
- F-J列（前期+开业）记录已发生的亮点，K-M列（后期）生成剩余运营期的深度内容
- 角色从"主角"转为"集群常驻成员"，在项目年度IP节点中以搭配角色参与

### 第四步：生成品牌推广打样表

**Step 4.1：E列叙事层（策略概述）**

对每个模块的E列，按以下逻辑撰写：

- **模块1（品牌卖点与话题造势）**：集中呈现完整的叙事定位+叙事主线+三钩子+话题标签+量化目标，≥100字
- **模块2-5（线上执行）**：围绕品牌的叙事主线，从各模块的专业角度展开具体执行策略，≥30-40字
- **模块6-8（线下执行）**：同样围绕叙事主线，描述线下的配套执行（施工/培训/PR），≥30字

**Step 4.2：T-axis单元格层（时间轴执行）**

对每个T-axis单元格（F-M列），按以下逻辑撰写：

- **F列（合同签约）**：品牌的签约仪式和首次曝光计划（≥50字对模块1，≥20字对模块2）
- **G列（T-21至T-15，造势期）**：围绕品牌故事和项目价值的前期预热（≥50字对模块1，≥30字对模块2）
- **H列（T-14至T-4，锁客期）**：强化品牌卖点，制造紧迫感，启动预约（≥50字对模块1，≥30字对模块2）
- **I列（T-3至T-1，冲刺期）**：倒计时、限量预约、最后冲刺（≥50字对模块1，≥30字对模块2）
- **J列（开业亮相，引爆）**：开业当天的全矩阵引爆，是全月最高峰（≥100字对模块1，≥50字对模块2）
- **K列（T+1至T+3，爆单期）**：开业后热度维护、战报传播、用户评价收集（≥80字对模块1）
- **L列（T+4至T+30，稳场期）**：常态运营，融入项目IP节点，形成打卡文化（≥80字对模块1）
- **M列（T+30后，长效经营）**：持续的推荐习惯和社交货币，成为项目常驻品牌（≥80字对模块1）

每个单元格的内容包含：
- 具体执行动作（不用"宣发""推广"这样的笼统词，要说具体怎么做）
- 数字目标（几个KOL、几条内容、多少GMV）
- 预期效果（声量、客流、销售）

**Step 4.3：内容特异化**

确保每个模块的E列和T-axis内容都是**为这个品牌量身定制的**：
- 模块2（全员宣发）要根据品牌调性选择合适的KOL/KOC方向，不是每个品牌都"美食探店+生活方式+摄影"
- 模块3（权益预设）要根据品牌客单价推导SP货盘，不是每个品牌都团券49.9元
- 模块4（直播）要明确品牌的直播主题和货盘方向，不是泛泛的"品牌开业直播"
- 模块5（口碑）要根据品牌的品类和目标评分制定运维策略

### 第五步：品质自检

**自检项1：字数检查**
- 遍历所有单元格，统计实际字数
- 与规则6的字数表逐一对照
- 不达标的单元格必须重写后再交付

**自检项2：叙事完整性检查**
- 如果是未开业品牌，8步是否全部呈现，每步是否有具体执行动作
- 如果是已开业品牌，4个运营阶段是否清晰界定，每阶段的角色转变是否合理

**自检项3：反偷懒检查**
- 搜索是否存在"推广""宣发""持续运营"等笼统词汇，如有则替换为具体动作
- 检查是否存在"两弹并行""预热启动"等抽象标题，如有则替换为具体创意动作名称
- 确认模块1-8的叙事角度是否独立，是否存在大量内容重复

**自检项4：防套用检查**
- 搜索生成内容是否包含已被其他项目使用的关键话题（如"100种生活""引力场"等）
- 检查KOL/KOC内容方向是否过于通用，是否根据品牌特色和城市生态定制
- 确认PR联动对象是否为具体的媒体/机构名称，而非"文旅局""本地媒体"等笼统词

## 核心叙事框架详解

### 未开业品牌 — 8步叙事法详解

为了确保生成的内容具体可执行，每一步都应该按以下模板展开：

#### 第一步：悬念围挡（T-21至T-15）
**目的**：让消费者产生"这里在建设什么神秘东西"的好奇心
- 围挡文案：一句话的神秘预告文案（不能暴露品牌名称或品类，只暗示）
- 品牌悬念：官号发布"施工偷拍"短视频、高管团队"探秘"vlog、品牌创始人"为什么选择这个项目"的专访
- KOL×3：邀请本地达人发布"听说这里在建一个XXX"的猜测内容
- KOC×10：引导消费者到现场拍照上传"围挡外的秘密"

#### 第二步：两弹并行（T-14至T-8）
**目的**：揭秘品牌个性，同时强化项目价值
- 第一弹（品牌个性）：品牌创始人专访、品牌故事、核心菜品/产品首次曝光
- 第二弹（项目价值）：这个品牌填补了这个项目什么空白，这个品牌对这个项目意味着什么
- KOL×5：分别从"品牌故事"和"项目意义"两个角度发布内容
- 话题上线：与品牌相关的专属话题首次启动

#### 第三步：价值冲击（T-7至T-4）
**目的**：将品牌上升到城市级的意义阐述
- 城市级叙事：这个品牌是"衢州第一家高端韩料""改变这个城市夜经济格局的新品牌""年轻人新的聚集地"
- KOL×3：从城市视角、行业视角发布"为什么衢州需要这个品牌"的内容
- PR稿件：与本地媒体合作发布"城市新地标"相关报道
- 社群转发：项目所有品牌和职人账号集中转发，造成"全城热议"的氛围

#### 第四步：紧迫引爆（T-3至T-1）
**目的**：制造"马上就来"的紧迫感，启动限量预约
- 倒计时文案：每天更新一次倒计时，配套内容（开业当天如何参与、限量预约如何预定等）
- 限量预约：推出"首日前100名""首周限定套餐"等有明确数字限制的预约/优惠
- KOL×3+KOC×20：全力发动矩阵制造热度，鼓励转发和邀请
- 直播预告：直播间计数器启动，展示有多少人在等待开业

#### 第五步：城市事件（开业当天）
**目的**：把开业定义为一个"城市大事件"，全矩阵引爆
- 开业仪式：品牌主理人、项目CEO、本地名人联合参与的开业活动
- 现场直播：官号开展现场走播，展示排队人群、环境、菜品等，实时互动
- KOL全员到场：邀请的所有KOL当天到场进行现场直播/拍照
- 成为话题中心：当天所有相关内容都挂载品牌话题，形成话题热榜
- 媒体覆盖：本地主流媒体现场报道，形成"开业即新闻"的效应

#### 第六步：战报引爆（T+1至T+3）
**目的**：用数据证明成功，引爆第二波传播
- 战报发布：当天销售额/排队人数/参与人数等量化数据公开发布（"开业首日1000+客流""首日营业额破XX万"）
- 三级内容分发：
  - 一级：官号发布战报、现场精彩视频集锦
  - 二级：KOL转发评论，分享现场见闻
  - 三级：消费者UGC，分享开业当天的打卡照片和用餐体验
- 好评激励：收集并放大消费者的实拍好评，奖励优质评价（积分、优惠券、免费餐券等）

#### 第七步：UGC裂变（T+4至T+30）
**目的**：不再依赖官方宣发，形成用户自发的内容裂变
- KOC持续输出：邀请已购买的消费者每周分享"打卡照""用餐体验""推荐朋友"等内容
- 话题激励：发布品牌话题相关内容即可参与抽奖，激励更多UGC
- 大众点评运维：响应每一条评论，收集4分以上好评，置顶精选评价
- 积分激励：打卡、写评价、邀请朋友都能获得积分，积分可兑换优惠

#### 第八步：长效社交货币（T+30后）
**目的**：让"去这个品牌"成为一种持续的生活习惯和社交分享
- 周期性内容：品牌发起"周三美食家""周末朋友聚"等定期主题，保持消费频次
- 打卡成为身份：鼓励消费者将"在XXX用过餐"视为一种身份认同和谈资
- 持续新品激励：定期推出新菜品/新套餐，保持"总有新理由去"的动力
- 长期KOL合作：与一些本地KOL建立长期合作关系，定期发起主题用餐活动

### 已开业品牌 — 运营阶段叙事详解

如果品牌已开业，则不再使用"T-21倒计时"的时间轴，而是重新定义为四个运营阶段。每个阶段的叙事角色和动作目标都不同：

#### 阶段1：首店引爆（对标F-J列）
**角色**：主角，全矩阵聚焦，冲刺声量和客流
**时间线**：开业前2周至开业后3天
**核心动作**：
- 官方、KOL、KOC、职人全员参与
- 围绕"新店/首店"制造热度
- 大众点评快速冲4.0+评分
- 销售目标：周销售额、日客流数

#### 阶段2：热度延续（对标K列T+1至T+3）
**角色**：主角向配角转变
**时间线**：开业后4-7天
**核心动作**：
- KOL逐步退出，KOC和消费者UGC成为主角
- 战报传播、好评扩散
- 开始参与项目的其他活动/节点
- 销售目标：维持日均客流

#### 阶段3：节点引擎（对标L列T+4至T+30）
**角色**：集群成员，在项目IP节点中搭配出现
**时间线**：开业后8-30天
**核心动作**：
- 不再"单兵作战"，而是融入项目的各个IP节点（周年庆、季度活动、美陈主题等）
- 与其他品牌形成"搭配菜单"概念（如"聚餐套餐"涵盖多个品牌）
- 参与项目的联合营销活动
- 销售目标：稳定日均客流

#### 阶段4：长效生态（对标M列T+30后）
**角色**：常驻品牌，成为项目的日常推荐选项之一
**时间线**：开业后30天至年底
**核心动作**：
- 打卡文化成型，消费者自发推荐
- 定期推出新产品/新活动保持热度
- 融入会员体系，积分激励复购
- 在社交媒体上成为"这个商场必去品牌"之一
- 销售目标：形成稳定的复购客群

## 品牌在不同时间状态下的处理规则

### 时间不确定的品牌（如"约X月开业"）

❌ **错误做法**：因为时间不确定就只写"待定"或简略内容

✅ **正确做法**：
- 按用户提供的预估时间生成完整8步叙事
- 在所有时间标注上加"约"字，如"约T-21""约4月中"
- 内容深度**完全不降级**，按最高标准撰写
- 生成时向用户说明"这是基于约X月的预估版本，实际开业日期确定后可调整"

### 已开业品牌的处理

❌ **错误做法**：写"已开业，无需推广"或"已完成"

✅ **正确做法**：
- 识别品牌的当前运营阶段（首店引爆/热度延续/节点引擎/长效生态）
- 重新定义T-axis为这四个运营阶段
- 生成剩余运营期（从当前到年底）的深度推广方案
- 角色定位从"新品牌主角"调整为"集群成员搭配角色"
- 继续保持高质量的执行标准

## 常见问题解答

### Q1：品牌信息不完整，如何处理？

**A**：
- 必需信息缺失时（如开业时间），主动向用户提问并等待回复
- 可选信息缺失时（如客单价），根据品牌类型AI推导（如"中档餐饮通常200-400元"）
- 补充说明：告知用户"基于您提供的信息生成，以下信息若确认错误可随时调整"

### Q2：品牌还没有明确的叙事定位或卖点，如何生成？

**A**：
- 通过追问品牌的差异化卖点、目标客群、核心竞争力，帮助用户梳理
- 根据品牌类型和项目位置推导合理的叙事定位（如"首家""高端""创意"等）
- 生成后邀请用户反馈和修改

### Q3：某个时间阶段的内容实在写不出来，可以简短吗？

**A**：
- 再检查一遍是否理解了这个阶段的目标（参考规则3和规则9的具体动作描述）
- 如果确实这个阶段没有特殊动作（如某些品牌可能跳过"造势期"直接进"锁客期"），说明理由后可简化
- 但**任何活跃阶段都不能低于字数下限**（E列≥50字，T-axis≥15字）

### Q4：已开业品牌应该如何定义T-axis？

**A**：
- F-J列记录"首店引爆阶段"（从开业前期到开业后3天）
- K列记录"热度延续阶段"（T+4-7天，用户评价爆发期）
- L列记录"节点引擎阶段"（T+8-30天，融入项目IP节点）
- M列记录"长效生态阶段"（T+30后，持续打卡习惯）

### Q5：SP货盘如何设计才不会套用其他品牌？

**A**：
- 根据品牌的**客单价**而非品牌类型推导（高/中/低三档）
- 同一个客单价档，也要根据**品牌的特色**设计不同的套餐组合（如火锅的"人数套餐"和烘焙的"组合套餐"是不同的）
- 参考当地消费行为和竞品价格，确保有竞争力

### 规则10：叙事引擎
每张打样表都要有一条叙事主线贯穿所有时间节点。叙事引擎不是简单描述"做什么"，而是讲述"为什么消费者要关注"的完整故事线。

### 规则11：禁止占位符式内容（铁律）

❌ 8个模块内容雷同（只换模块名，内容复制粘贴）

### 规则12：生成后自检
生成完成后必须逐格检查字数是否达标，不达标的必须重写。

### 规则13：防套用（强制原创）
方法论可复用，具体内容必须原创。以下内容禁止套用其他项目：
- 场景专属话题（❌"X里的100种生活"是枣庄专属）

每个T轴单元格的【】标题必须有情绪张力和画面感，是具体创意动作名。

模块1（话题推演/叙事）字数和内容深度必须显著高于其他模块。其他模块写法简洁精准，聚焦具体执行动作。E列写策略纲领，T轴写时间展开，两者不重复。

**M1 = 讲故事（WHAT & WHY）**：

function isDebutInPast(dateStr) {
  if (!dateStr) return false;
  const m = dateStr.match(/(\d{4})/);
  if (!m) return false;
  const year = parseInt(m[1]);
  return year < 2026;
}

【规则3：每个 module 必须 5 个 columns】
- columns 数组严格 5 个字符串元素，对应 F/G/H/I/J 列
- 每个字符串必须是真实内容（不是"F列"这种占位），字数达标

【规则4：叙事独立性】

【规则5：场景 vs 活动的边界（核心纪律，违反直接重写）】

function generateFormatExcel(data, common) {
  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet([]);

  const projectName = common.project_name || '项目';
  const modules = data.modules || [];
  const narrative = data.narrative_engine || '';

  let rowIdx = 0;

  // Title row
  if(!ws['!merges'])ws['!merges']=[];ws['!merges'].push({ s: { r: rowIdx, c: 0 }, e: { r: rowIdx, c: 16 } });
  ws[XLSX.utils.encode_cell({ r: rowIdx, c: 0 })] = {
    v: `${projectName} · 超级业态打样表（2026年度）`,
    s: { font: { bold: true, sz: 14 }, alignment: { horizontal: 'center', vertical: 'center' } }
  };
  rowIdx++;

  // Category header row
  const fixedHeaders = ['26年重点工作', '案例', '板块', '工作模块', '具体工作内容\n(执行动作说明)'];
  for (let i = 0; i < fixedHeaders.length; i++) {
    ws[XLSX.utils.encode_cell({ r: rowIdx, c: i })] = {
      v: fixedHeaders[i],
      s: { font: { bold: true }, fill: { fgColor: { rgb: 'FFD9E2F3' } }, alignment: { horizontal: 'center', wrapText: true } }
    };
    ws['!merges'].push({ s: { r: rowIdx, c: i }, e: { r: rowIdx + 1, c: i } });
  }
  // "2026年时间轴" spanning month columns
  ws[XLSX.utils.encode_cell({ r: rowIdx, c: 5 })] = {
    v: '2026年时间轴', s: { font: { bold: true }, fill: { fgColor: { rgb: 'FFD9E2F3' } }, alignment: { horizontal: 'center' } }
  };
  ws['!merges'].push({ s: { r: rowIdx, c: 5 }, e: { r: rowIdx, c: 16 } });
  rowIdx++;

  // Month header row
  const monthHeaders = ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'];
  for (let i = 0; i < monthHeaders.length; i++) {
    ws[XLSX.utils.encode_cell({ r: rowIdx, c: 5 + i })] = {
      v: monthHeaders[i],
      s: { font: { bold: true }, fill: { fgColor: { rgb: 'FFD9E2F3' } }, alignment: { horizontal: 'center' } }
    };
  }
  rowIdx++;

  // Modules
  const startRow = rowIdx;
  const formatName = data.format_name || projectName;

  for (let idx = 0; idx < modules.length; idx++) {
    const mod = modules[idx];
    const cellIdx = startRow + idx;

    if (idx === 0) {
      ws[XLSX.utils.encode_cell({ r: cellIdx, c: 0 })] = { v: '超级业态', s: { font: { bold: true } } };
      ws[XLSX.utils.encode_cell({ r: cellIdx, c: 1 })] = { v: formatName, s: { alignment: { wrapText: true } } };
    }

    ws[XLSX.utils.encode_cell({ r: cellIdx, c: 2 })] = { v: mod.section || '线上' };
    ws[XLSX.utils.encode_cell({ r: cellIdx, c: 3 })] = { v: mod.name || '', s: { alignment: { wrapText: true } } };
    ws[XLSX.utils.encode_cell({ r: cellIdx, c: 4 })] = { v: mod.e_content || '', s: { alignment: { wrapText: true } } };

    const months = mod.months || {};
    for (let m = 1; m <= 12; m++) {
      ws[XLSX.utils.encode_cell({ r: cellIdx, c: 4 + m })] = { v: months[String(m)] || '/', s: { alignment: { wrapText: true } } };
    }
  }

  // Merge cells
  if (modules.length > 0) {
    if(!ws['!merges'])ws['!merges']=[];ws['!merges'].push({ s: { r: startRow, c: 0 }, e: { r: startRow + modules.length - 1, c: 0 } });
    if(!ws['!merges'])ws['!merges']=[];ws['!merges'].push({ s: { r: startRow, c: 1 }, e: { r: startRow + modules.length - 1, c: 1 } });
  }

  ws['!cols'] = [
    { wch: 14 }, { wch: 30 }, { wch: 6 }, { wch: 20 }, { wch: 30 },
    { wch: 25 }, { wch: 25 }, { wch: 25 }, { wch: 25 }, { wch: 25 }, { wch: 25 },
    { wch: 25 }, { wch: 25 }, { wch: 25 }, { wch: 25 }, { wch: 25 }, { wch: 25 }
  ];

  const lastRow = startRow + modules.length - 1;
  ws['!ref'] = XLSX.utils.encode_range({ s: { r: 0, c: 0 }, e: { r: Math.max(lastRow, 3), c: 16 } });
  XLSX.utils.book_append_sheet(wb, ws, '超级业态运营方案');
  XLSX.writeFile(wb, `${projectName}-超级业态运营方案.xlsx`);
}

        ws[XLSX.utils.encode_cell({ r: cellIdx, c: 1 })] = { v: sceneName, s: { alignment: { wrapText: true } } };
      }

      ws[XLSX.utils.encode_cell({ r: cellIdx, c: 2 })] = { v: mod.section || '线上' };
      ws[XLSX.utils.encode_cell({ r: cellIdx, c: 3 })] = { v: mod.name || '', s: { alignment: { wrapText: true } } };
      ws[XLSX.utils.encode_cell({ r: cellIdx, c: 4 })] = { v: mod.e_content || '', s: { alignment: { wrapText: true } } };

      // Month columns
      const months = mod.months || {};
      for (let mi = 0; mi < 12; mi++) {
        const mKey = String(mi + 1);
        ws[XLSX.utils.encode_cell({ r: cellIdx, c: 5 + mi })] = {
          v: months[mKey] || '', s: { alignment: { wrapText: true } }
        };
      }
    }

    // Merge A and B columns
    if (modules.length > 0) {
      ws['!merges'].push({ s: { r: startRow, c: 0 }, e: { r: startRow + modules.length - 1, c: 0 } });
      ws['!merges'].push({ s: { r: startRow, c: 1 }, e: { r: startRow + modules.length - 1, c: 1 } });
      // Merge C column: 线上 (modules 1-5) and 线下 (modules 6-8)
      const onlineEnd = Math.min(4, modules.length - 1);
      if (onlineEnd > 0) {
        ws['!merges'].push({ s: { r: startRow, c: 2 }, e: { r: startRow + onlineEnd, c: 2 } });
      }
      if (modules.length > 5) {
        ws['!merges'].push({ s: { r: startRow + 5, c: 2 }, e: { r: startRow + modules.length - 1, c: 2 } });
      }
    }

    ws['!cols'] = [
      { wch: 14 }, { wch: 22 }, { wch: 8 }, { wch: 28 }, { wch: 40 },
      ...monthHeaders.map(() => ({ wch: 30 }))
    ];

    ws['!ref'] = XLSX.utils.encode_range({ s: { r: 0, c: 0 }, e: { r: Math.max(startRow + modules.length - 1, 3), c: totalCols - 1 } });
    XLSX.utils.book_append_sheet(wb, ws, '超级场景运营方案');
    XLSX.writeFile(wb, `${projectName}-超级场景运营方案.xlsx`);

  } else {
    // ========== 新场景：T轴结构（10列） ==========
    const wb = XLSX.utils.book_new();
    const ws = XLSX.utils.aoa_to_sheet([]);
    const projectName = common.project_name || '项目';
    const modules = data.modules || [];
    const tHeaders = data.t_axis_headers || [
      '图纸定稿及进场施工', 'T-30至T-22', 'T-21至T-15', 'T-14至T-8',
      'T-7至T-1', '开业亮相', 'T+1至T+3天', 'T+7至T+14天', 'T15至T30天', '常态化运营'
    ];
    const totalCols = 5 + tHeaders.length;

    let rowIdx = 0;
    if(!ws['!merges'])ws['!merges']=[];

    // Title row
    ws['!merges'].push({ s: { r: rowIdx, c: 0 }, e: { r: rowIdx, c: totalCols - 1 } });
    ws[XLSX.utils.encode_cell({ r: rowIdx, c: 0 })] = {
      v: `${projectName} · 超级场景打样表（2026年度）`,
      s: { font: { bold: true, sz: 14 }, alignment: { horizontal: 'center' } }
    };
    rowIdx++;

    // Category header row (前期/亮相/后期)
    const fixedHeaders = ['26年重点工作', '案例', '板块', '工作模块', '具体工作内容\n(执行动作说明)'];
    for (let i = 0; i < fixedHeaders.length; i++) {
      ws[XLSX.utils.encode_cell({ r: rowIdx, c: i })] = {
        v: fixedHeaders[i],
        s: { font: { bold: true }, fill: { fgColor: { rgb: 'FFD9E2F3' } }, alignment: { horizontal: 'center', wrapText: true } }
      };
      ws['!merges'].push({ s: { r: rowIdx, c: i }, e: { r: rowIdx + 1, c: i } });
    }
    const preCount = Math.min(5, tHeaders.length);
    ws[XLSX.utils.encode_cell({ r: rowIdx, c: 5 })] = {
      v: '前期', s: { font: { bold: true }, fill: { fgColor: { rgb: 'FFD9E2F3' } }, alignment: { horizontal: 'center' } }
    };
    if (preCount > 1) ws['!merges'].push({ s: { r: rowIdx, c: 5 }, e: { r: rowIdx, c: 5 + preCount - 1 } });
    if (tHeaders.length > 5) {
      ws[XLSX.utils.encode_cell({ r: rowIdx, c: 5 + preCount })] = {
        v: '亮相', s: { font: { bold: true }, fill: { fgColor: { rgb: 'FFD9E2F3' } }, alignment: { horizontal: 'center' } }
      };
    }
    if (tHeaders.length > 6) {
      ws[XLSX.utils.encode_cell({ r: rowIdx, c: 5 + preCount + 1 })] = {
        v: '后期', s: { font: { bold: true }, fill: { fgColor: { rgb: 'FFD9E2F3' } }, alignment: { horizontal: 'center' } }
      };
      if (tHeaders.length > 7) ws['!merges'].push({ s: { r: rowIdx, c: 5 + preCount + 1 }, e: { r: rowIdx, c: totalCols - 1 } });
    }
    rowIdx++;

    // T-axis header row
    for (let i = 0; i < tHeaders.length; i++) {
      ws[XLSX.utils.encode_cell({ r: rowIdx, c: 5 + i })] = {
        v: tHeaders[i],
        s: { font: { bold: true }, fill: { fgColor: { rgb: 'FFD9E2F3' } }, alignment: { horizontal: 'center', wrapText: true } }
      };
    }
    rowIdx++;

    // Data rows
    const startRow = rowIdx;
    const sceneName = common.scene_name || data.scene_name || projectName;

    for (let idx = 0; idx < modules.length; idx++) {
      const mod = modules[idx];
      const cellIdx = startRow + idx;

      if (idx === 0) {
        ws[XLSX.utils.encode_cell({ r: cellIdx, c: 0 })] = { v: '超级场景', s: { font: { bold: true } } };
        ws[XLSX.utils.encode_cell({ r: cellIdx, c: 1 })] = { v: sceneName, s: { alignment: { wrapText: true } } };
      }

      ws[XLSX.utils.encode_cell({ r: cellIdx, c: 2 })] = { v: mod.section || '线上' };
      ws[XLSX.utils.encode_cell({ r: cellIdx, c: 3 })] = { v: mod.name || '', s: { alignment: { wrapText: true } } };
      ws[XLSX.utils.encode_cell({ r: cellIdx, c: 4 })] = { v: mod.e_content || '', s: { alignment: { wrapText: true } } };

      const tAxisData = mod.t_axis || [];
      if (tAxisData.length > 0) {
        for (let ti = 0; ti < tHeaders.length; ti++) {
          ws[XLSX.utils.encode_cell({ r: cellIdx, c: 5 + ti })] = { v: tAxisData[ti] || '/', s: { alignment: { wrapText: true } } };
        }
      } else {
        const phases = mod.phases || {};
        const phaseKeys = Object.keys(phases);
        for (let ti = 0; ti < tHeaders.length; ti++) {
          ws[XLSX.utils.encode_cell({ r: cellIdx, c: 5 + ti })] = { v: phases[phaseKeys[ti]] || '/', s: { alignment: { wrapText: true } } };
        }
      }
    }

    // Merge A, B, C columns
    if (modules.length > 0) {
      ws['!merges'].push({ s: { r: startRow, c: 0 }, e: { r: startRow + modules.length - 1, c: 0 } });
      ws['!merges'].push({ s: { r: startRow, c: 1 }, e: { r: startRow + modules.length - 1, c: 1 } });
      const onlineEnd = Math.min(4, modules.length - 1);
      if (onlineEnd > 0) {
        ws['!merges'].push({ s: { r: startRow, c: 2 }, e: { r: startRow + onlineEnd, c: 2 } });
      }
      if (modules.length > 5) {
        ws['!merges'].push({ s: { r: startRow + 5, c: 2 }, e: { r: startRow + modules.length - 1, c: 2 } });

    ws['!cols'] = [

    XLSX.utils.book_append_sheet(wb, ws, '超级场景运营方案');

function FormField({ label, required, optional, hint, children, fullWidth }) {
  return (
    <div className={`form-group ${fullWidth ? 'full-width' : ''}`}>
      <label>
        {label}
        {required && <span className="required">*</span>}
        {optional && <span className="optional">（可选）</span>}
      </label>
      {children}
      {hint && <div className="hint">{hint}</div>}
    </div>
  );
}

function App() {
  const [activeTab, setActiveTab] = useState('format');
  const [common, setCommon] = useState({
    project_name: '',
    city: '',
    positioning: '',
    promotion_tone: '',
    target_audience: '',
    annual_theme: '',
    marketing_bg: ''
  });
  const [specific, setSpecific] = useState({
    format_positioning: '',
    brands: [{ ...EMPTY_FORMAT_BRAND }],
    scene_name: '',
    scene_location: '',
    scene_composition: '',
    scene_positioning: '',
    debut_date: '',
    transform_nodes: '',
    scene_image: null,
    scene_image_preview: null,
    activities: [{ ...EMPTY_IP_ACTIVITY }]
  });
  const [apiKey, setApiKey] = useState('');
  const [loading, setLoading] = useState(false);
  const [status, setStatus] = useState('');
  const [result, setResult] = useState(null);
  const [debugRaw, setDebugRaw] = useState('');

  const handleGenerate = async () => {
    if (!apiKey.trim()) {
      setStatus('请输入API Key');
      return;
    }
    if (!common.project_name.trim()) {
      setStatus('请填写项目名称');
      return;
    }

    setLoading(true);
    setStatus('正在生成中....');
    setDebugRaw(''); // 清空上一次调试面板

    try {
      const tabName = TABS.find(t => t.key === activeTab)?.name || '';
      const systemPrompt = buildSystemPrompt(activeTab, tabName);
      const userPrompt = PROMPT_BUILDERS[activeTab](common, specific);

      const requestBody = {
        model: 'claude-sonnet-4-20250514',
        max_tokens: 32000,
        stream: true,
        system: systemPrompt,
        messages: [{ role: 'user', content: userPrompt }]
      };

      const response = await fetch(`${CLAUDE_PROXY_URL}/v1/messages`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify(requestBody)
      });

      if (!response.ok) {
        let errMsg = `API error: ${response.status}`;
        try {
          const errText = await response.text();
          if (errText.includes('<!DOCTYPE') || errText.includes('<html')) {
            errMsg = '代理返回了HTML错误页，可能是Cloudflare超时，请重试';
          } else {
            try {
              const errData = JSON.parse(errText);
              errMsg = errData.error?.message || errMsg;
            } catch(e2) { /* use default errMsg */ }
          }
        } catch(e) { /* use default errMsg */ }
        throw new Error(errMsg);
      }

      // --- 流式读取 SSE（含网络中断容错） ---
      setStatus('正在接收AI响应...');
      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let responseText = '';
      let sseBuffer = '';
      let streamError = null;

      try {
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          sseBuffer += decoder.decode(value, { stream: true });

          const lines = sseBuffer.split('\n');
          sseBuffer = lines.pop(); // keep incomplete line in buffer

          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            const payload = line.slice(6).trim();
            if (payload === '[DONE]') continue;
            try {
              const evt = JSON.parse(payload);
              if (evt.type === 'content_block_delta' && evt.delta?.text) {
                responseText += evt.delta.text;
                if (responseText.length % 200 < 20) {
                  setStatus(`正在接收AI响应... 已收到 ${responseText.length} 字符`);
                  setDebugRaw(responseText); // 边接收边显示
                }
              } else if (evt.type === 'error') {
                throw new Error(evt.error?.message || 'Stream error');
              }
            } catch (parseErr) {
              // skip non-JSON SSE lines (event:, etc.)
            }
          }
        }
      } catch (netErr) {
        streamError = netErr;
        console.warn('流式传输中断，已收到', responseText.length, '字符，尝试用已有数据恢复...');
      }

      // 保存原始响应供页面调试查看（无需 F12）
      setDebugRaw(responseText || '(空)');

      if (!responseText) {
        throw new Error(streamError ? `network error（网络中断，未收到任何数据，请检查网络后重试）` : 'AI未返回任何内容，请重试');
      }
      // 如果网络中断但已收到部分数据，提示用户但继续尝试解析
      if (streamError && responseText.length > 0) {
        setStatus(`⚠️ 网络中断（已收到${responseText.length}字符），正在尝试用已有数据生成...`);
      }

      let jsonData;
      const repairJSON = (str) => {
        let s = str.trim();
        // 1. 彻底剥离 markdown 代码块（包括开头和末尾的 ```json / ```）
        s = s.replace(/^```(?:json)?\s*/i, '').replace(/```\s*$/i, '').trim();
        s = s.replace(/`{3,}(?:json)?/gi, '').trim();
        // 2. 按首个 { 到最后一个 } 裁剪（丢掉前后任何解释性文字或残留反引号）
        const firstBrace = s.indexOf('{');
        const lastBrace = s.lastIndexOf('}');
        if (firstBrace !== -1 && lastBrace !== -1 && lastBrace > firstBrace) {
          s = s.substring(firstBrace, lastBrace + 1);
        }
        // 3. 修复末尾逗号
        s = s.replace(/,\s*([\}\]])/g, '$1');
        // 4. 逐字符扫描：转义字符串内所有控制字符（\n \r \t 及 charCode<0x20）
        //    替代原来的正则方案，解决超长中文字符串正则回溯失败的问题
        let result = '';
        let inString = false;
        let esc = false;
        for (let i = 0; i < s.length; i++) {
          const c = s[i];
          if (esc) { result += c; esc = false; continue; }
          if (c === '\\' && inString) { result += c; esc = true; continue; }
          if (c === '"') { inString = !inString; result += c; continue; }
          if (inString) {
            const code = c.charCodeAt(0);
            if (c === '\n') { result += '\\n'; continue; }
            if (c === '\r') { result += '\\r'; continue; }
            if (c === '\t') { result += '\\t'; continue; }
            if (code < 0x20) { result += '\\u' + code.toString(16).padStart(4, '0'); continue; }
          }
          result += c;
        }
        return result;
      };
      // 截断修复：如果响应在字符串/数组/对象中间被硬切断，扫描并补齐
      const repairTruncated = (raw) => {
        let s = raw.trim();
        s = s.replace(/^```(?:json)?\s*/i, '').replace(/```\s*$/i, '').trim();
        const firstBrace = s.indexOf('{');
        if (firstBrace === -1) return s;
        s = s.substring(firstBrace);
        // 逐字符扫描，跟踪括号栈 + 字符串状态
        const stack = []; // '{' or '['
        let inString = false;
        let escape = false;
        let lastCompleteIdx = -1; // 最后一个"安全"切断点（字符串外、在 , 或 } 或 ] 之后）
        for (let i = 0; i < s.length; i++) {
          const c = s[i];
          if (escape) { escape = false; continue; }
          if (c === '\\') { escape = true; continue; }
          if (inString) {
            if (c === '"') inString = false;
            continue;
          }
          if (c === '"') { inString = true; continue; }
          if (c === '{' || c === '[') stack.push(c);
          else if (c === '}' || c === ']') { stack.pop(); lastCompleteIdx = i; }
          else if (c === ',') lastCompleteIdx = i;
        }
        // 如果末尾在字符串中，回退到最后一个 ,/]/} 后截断
        if (inString) {
          if (lastCompleteIdx > 0) {
            s = s.substring(0, lastCompleteIdx + 1);
            // 重算 stack
            stack.length = 0;
            let inS = false, esc = false;
            for (let i = 0; i < s.length; i++) {
              const c = s[i];
              if (esc) { esc = false; continue; }
              if (c === '\\') { esc = true; continue; }
              if (inS) { if (c === '"') inS = false; continue; }
              if (c === '"') { inS = true; continue; }
              if (c === '{' || c === '[') stack.push(c);
              else if (c === '}' || c === ']') stack.pop();
            }
          } else {
            s += '"'; // 兜底关闭字符串
          }
        }
        // 去掉末尾多余的逗号
        s = s.replace(/,\s*$/, '');
        // 按栈反向补齐括号
        while (stack.length > 0) {
          const open = stack.pop();
          s += open === '{' ? '}' : ']';
        }
        // 再清一遍尾逗号
        s = s.replace(/,\s*([\}\]])/g, '$1');
        return s;
      };
      try {
        jsonData = JSON.parse(responseText);
      } catch (e1) {
        try {
          jsonData = JSON.parse(repairJSON(responseText));
        } catch (e2) {
          try {
            // 高级截断修复
            jsonData = JSON.parse(repairTruncated(responseText));
          } catch (e3) {
            console.error('JSON 修复彻底失败。原始响应前 3000 字：', responseText.slice(0, 3000));
            console.error('原始响应后 1000 字：', responseText.slice(-1000));
            const tail = responseText.slice(-200).trim();
            const looksTrunc = !tail.endsWith('}') && !tail.endsWith(']');
            let hint = '';
            if (streamError) {
              hint = `（网络中断，仅收到${responseText.length}字符。请检查网络连接是否稳定，然后重试）`;
            } else if (looksTrunc) {
              hint = '（AI 输出在中途被硬截断，常见原因：单次请求内容过多。建议精简输入/分多次生成后重试）';
            } else if (responseText.length > 30000) {
              hint = '（输出可能已被截断，建议减少输入数量后重试）';
            }
            throw new Error('AI返回的JSON格式有误' + hint + '。解析错误: ' + (e3.message || e2.message || e1.message).slice(0, 200));
          }
        }
      }

      const excelGenerator = EXCEL_GENERATORS[activeTab];
      const excelCommon = { ...common, scene_name: specific.scene_name || '' };
      const downloadFn = () => excelGenerator(jsonData, excelCommon);

      // Build preview
      let previewSections = [];
      if (activeTab === 'format') {
        const modules = jsonData.modules || [];
        const rows = [];
        modules.forEach(m => {
          Object.keys(m.months || {}).forEach(month => {
            rows.push({ module: m.name, time: `${month}月`, content: (m.months[month] || '').substring(0, 100) });
          });
        });
        previewSections = [{ title: '超级业态打样表', rows }];
      } else if (activeTab === 'scene') {
        const modules = jsonData.modules || [];
        const isExistingScene = jsonData.scene_mode === 'existing' || (modules[0] && modules[0].months);
        const rows = [];
        if (isExistingScene) {
          // 已亮相场景：月度预览
          modules.forEach(m => {
            Object.keys(m.months || {}).forEach(month => {
              rows.push({ module: m.name, time: `${month}月`, content: (m.months[month] || '').substring(0, 100) });
            });
          });
          previewSections = [{ title: '超级场景打样表（常态化运营）', rows }];
        } else {
          // 新场景：T轴预览
          const tHeaders = jsonData.t_axis_headers || [];
          modules.forEach(m => {
            const tAxis = m.t_axis || [];
            tAxis.forEach((content, idx) => {
              rows.push({ module: m.name, time: tHeaders[idx] || `T轴${idx+1}`, content: (content || '').substring(0, 100) });
            });
          });
          previewSections = [{ title: '超级场景打样表', rows }];
        }
      } else if (activeTab === 'ip') {
        const blocks = jsonData.blocks || [];
        blocks.forEach(block => {
          const rows = [];
          (block.modules || []).forEach(m => {
            (m.columns || []).forEach((col, idx) => {
              rows.push({ module: m.name, time: `列${idx+1}`, content: (col || '').substring(0, 100) });
            });
          });
          previewSections.push({ title: block.activity_name || '活动', rows });
        });
      } else if (activeTab === 'brand') {
        const blocks = jsonData.blocks || [];
        blocks.forEach(block => {
          const rows = [];
          (block.modules || []).forEach(m => {
            const cols = m.columns || {};
            Object.keys(cols).forEach(key => {
              rows.push({ module: m.name, time: key, content: (cols[key] || '').substring(0, 100) });
            });
          });
          previewSections.push({ title: block.brand_name || '品牌', rows });
        });
      }

      setResult({ preview: { sections: previewSections }, downloadFn });
      setStatus('✅ 生成成功！正在下载Excel...');
      setTimeout(() => downloadFn(), 500);
    } catch (err) {
      setStatus(`❌ 错误: ${err.message}`);
      console.error(err);
    } finally {
      setLoading(false);
    }
  };

  return (
    <div>
      <div className="app-header">
        <div className="header-content">
          <div>
            <h1>恒太运营方案生成器</h1>
            <div className="subtitle">AI驱动的商业运营方案自动化生成系统</div>
          </div>
          <div className="api-config-section">
            <div className="config-group">
              <label>代理URL:</label>
              <input
                className="config-input"
                placeholder="https://your-worker.workers.dev"
                defaultValue={CLAUDE_PROXY_URL}
                onChange={e => { CLAUDE_PROXY_URL = e.target.value; }}
                style={{minWidth: 300}}
              />
            </div>
            <div className="config-group">
              <label>API Key:</label>
              <input
                type="password"
                className="config-input"
                placeholder="sk-ant-..."
                value={apiKey}
                onChange={e => setApiKey(e.target.value)}
                style={{minWidth: 200}}
              />
            </div>
          </div>
        </div>
      </div>

      <div className="main-container">
        <CommonFields common={common} setCommon={setCommon} />

        <div className="tab-nav">
          {TABS.map(tab => (
            <button
              key={tab.key}
              className={`tab-btn ${activeTab === tab.key ? 'active' : ''}`}
              onClick={() => setActiveTab(tab.key)}
            >
              {tab.icon} {tab.name}
            </button>
          ))}
        </div>

        {activeTab === 'format' && <FormatTab specific={specific} setSpecific={setSpecific} />}
        {activeTab === 'scene' && <SceneTab specific={specific} setSpecific={setSpecific} />}
        {activeTab === 'ip' && <IpTab specific={specific} setSpecific={setSpecific} />}
        {activeTab === 'brand' && <BrandTab specific={specific} setSpecific={setSpecific} />}

        <div className="generate-section">
          <button className="btn-generate" onClick={handleGenerate} disabled={loading}>
            {loading ? <span className="spinner"></span> : '✨'}
            {loading ? '生成中...' : '生成方案'}
          </button>
          {status && <div className={`status-text ${status.includes('错误') || status.includes('❌') ? 'error' : status.includes('✅') ? 'success' : ''}`}>{status}</div>}
          {debugRaw && (
            <div style={{marginTop:'16px',border:'1px solid #ddd',borderRadius:'8px',background:'#f9f9f9'}}>
              <div style={{padding:'8px 12px',borderBottom:'1px solid #ddd',display:'flex',justifyContent:'space-between',alignItems:'center',fontWeight:'bold',fontSize:'13px'}}>
                <span>🔍 AI 原始响应（调试用，共 {debugRaw.length} 字符）</span>
                <span>
                  <button onClick={() => {navigator.clipboard.writeText(debugRaw); alert('已复制到剪贴板，可直接粘贴给 Claude 排查');}} style={{marginRight:'8px',padding:'2px 10px',fontSize:'12px',cursor:'pointer'}}>📋 复制全部</button>
                  <button onClick={() => setDebugRaw('')} style={{padding:'2px 10px',fontSize:'12px',cursor:'pointer'}}>✕ 关闭</button>
                </span>
              </div>
              <textarea
                readOnly
                value={debugRaw}
                style={{width:'100%',height:'300px',padding:'10px',border:'none',background:'#f9f9f9',fontFamily:'monospace',fontSize:'12px',resize:'vertical',boxSizing:'border-box'}}
              />
            </div>
          )}
        </div>

        {result && <PreviewPanel result={result} onClose={() => setResult(null)} />}
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
